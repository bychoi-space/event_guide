<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LFmall [기획전 NEW템플릿] 카드 상세 사용 가이드</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    /* ============================================================
       DETAIL PAGE — LAYOUT
       ============================================================ */
    .layout-container {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 40px;
      margin-top: 32px;
      transition: grid-template-columns 0.35s cubic-bezier(0.4, 0, 0.2, 1), gap 0.35s ease;
      position: relative;
    }
    .layout-container.sidebar-collapsed {
      grid-template-columns: 0px 1fr;
      gap: 0px;
    }

    /* ============================================================
       SIDEBAR
       ============================================================ */
    aside {
      padding-right: 20px;
      max-height: calc(100vh - 96px);
      overflow-y: auto;
      transition: opacity 0.25s ease, padding 0.35s ease, visibility 0.35s;
      position: sticky;
      top: 96px;
      visibility: visible;
    }
    .layout-container.sidebar-collapsed aside {
      opacity: 0;
      padding-right: 0;
      pointer-events: none;
      visibility: hidden;
      overflow: hidden;
    }
    aside::-webkit-scrollbar { width: 3px; }
    aside::-webkit-scrollbar-track { background: transparent; }
    aside::-webkit-scrollbar-thumb {
      background-color: var(--hairline);
      border-radius: 3px;
    }
    aside::-webkit-scrollbar-thumb:hover { background-color: var(--slate); }

    .sidebar-inner {
      background: var(--canvas-white);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 20px 16px;
      box-shadow: var(--shadow-sm);
    }

    .sidebar-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted-slate);
      margin-bottom: 14px;
      padding-left: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sidebar-label::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--action-blue);
    }

    aside ul { list-style: none; }
    aside li { margin-bottom: 2px; }
    aside a {
      text-decoration: none;
      color: var(--slate);
      font-size: 13px;
      font-weight: 450;
      padding: 9px 12px;
      display: block;
      border-radius: 8px;
      transition: all 0.18s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
    }
    aside a:hover {
      background-color: var(--bg-subtle);
      color: var(--ink);
    }
    aside a.active {
      background: var(--action-blue-light);
      color: var(--action-blue);
      font-weight: 600;
    }
    aside a.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 18px;
      background: var(--action-blue);
      border-radius: 0 3px 3px 0;
    }

    /* ============================================================
       GUIDE BODY — MAIN CONTENT
       ============================================================ */
    .guide-body {
      padding-bottom: 60px;
      min-height: 60vh;
    }

    /* Page title area */
    .guide-title-area {
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border-light);
    }
    .guide-title-area h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--near-black);
      margin-bottom: 8px;
    }
    .guide-meta-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .guide-meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      background: var(--soft-stone);
      color: var(--slate);
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.02em;
    }
    .guide-meta-chip.accent {
      background: var(--action-blue-light);
      color: var(--action-blue);
    }
    .guide-desc {
      font-size: 14px;
      line-height: 1.7;
      color: var(--slate);
      margin-top: 12px;
      max-width: 720px;
    }

    /* ============================================================
       SECTION HEADERS
       ============================================================ */
    .section-block {
      margin-top: 48px;
      margin-bottom: 20px;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--near-black);
    }
    .section-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--near-black);
      color: var(--canvas-white);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .section-header h2 {
      font-size: 20px;
      font-weight: 600;
      margin: 0;
      color: var(--near-black);
    }
    .section-subtitle {
      font-size: 13px;
      line-height: 1.6;
      color: var(--slate);
      margin-top: 10px;
      margin-bottom: 4px;
    }

    /* ============================================================
       IMAGE GUIDELINES CARD
       ============================================================ */
    .img-guide-card {
      background: var(--canvas-white);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 24px 28px;
      margin-bottom: 28px;
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
    }
    .img-guide-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--action-blue), var(--focus-blue));
    }
    .img-guide-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--near-black);
      margin-bottom: 18px;
    }
    .img-guide-header .icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--action-blue-light);
      border-radius: 6px;
      font-size: 12px;
    }
    .img-guide-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .img-guide-item {
      background: var(--bg-subtle);
      border-radius: 8px;
      padding: 14px;
    }
    .img-guide-item .label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted-slate);
      margin-bottom: 6px;
      display: block;
    }
    .img-guide-item .value {
      font-size: 12px;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.5;
    }
    .img-guide-item .value.warn {
      color: var(--coral);
      font-weight: 700;
    }
    .img-guide-footer {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border-light);
      font-size: 12px;
      color: var(--slate);
      line-height: 1.6;
    }
    .img-guide-footer strong {
      color: var(--near-black);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 2px;
    }

    @media (max-width: 900px) {
      .img-guide-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* ============================================================
       QUANTITY GUIDELINES CARD
       ============================================================ */
    .qty-guide-card {
      background: var(--canvas-white);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 24px 28px;
      margin-bottom: 28px;
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
    }
    .qty-guide-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--enterprise-green), var(--pale-green));
    }
    .qty-guide-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--near-black);
      margin-bottom: 18px;
    }
    .qty-guide-header .icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--pale-green);
      border-radius: 6px;
      font-size: 12px;
    }
    .qty-guide-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .qty-guide-item {
      background: var(--bg-subtle);
      border-radius: 8px;
      padding: 14px;
    }
    .qty-guide-item .label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--slate);
      margin-bottom: 6px;
      display: block;
    }
    .qty-guide-item .value {
      font-size: 12px;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.5;
    }
    .qty-guide-item .value.warn {
      color: var(--coral);
      font-weight: 700;
    }
    .qty-guide-footer {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border-light);
      font-size: 12px;
      color: var(--slate);
      line-height: 1.6;
    }
    .qty-guide-footer strong {
      color: var(--near-black);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 2px;
    }

    @media (max-width: 900px) {
      .qty-guide-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* ============================================================
       ADMIN TABLE
       ============================================================ */
    .admin-table-wrap {
      background: var(--canvas-white);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      margin-top: 16px;
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .admin-table thead { background: var(--near-black); }
    .admin-table th {
      color: var(--canvas-white);
      font-weight: 600;
      font-size: 11px;
      text-align: left;
      padding: 12px 18px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      font-family: 'Space Mono', monospace;
    }
    .admin-table td {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border-light);
      color: var(--ink);
      vertical-align: top;
      line-height: 1.5;
    }
    .admin-table tbody tr:nth-child(even) {
      background-color: var(--bg-subtle);
    }
    .admin-table tbody tr {
      transition: background-color 0.15s ease;
    }
    .admin-table tbody tr:hover {
      background-color: var(--action-blue-light);
    }
    .admin-table tbody tr:last-child td {
      border-bottom: none;
    }
    .field-name {
      font-weight: 600;
      color: var(--near-black);
      font-size: 13px;
    }
    .field-id {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--slate);
      background: var(--bg-subtle);
      padding: 2px 6px;
      border-radius: 4px;
      display: inline-block;
    }
    .field-type {
      font-size: 11px;
      font-weight: 600;
      background: var(--soft-stone);
      padding: 3px 8px;
      border-radius: 4px;
      display: inline-block;
      color: var(--ink);
      white-space: nowrap;
    }

    /* ============================================================
       WARNING / CAUTION BOX
       ============================================================ */
    .warn-box {
      background: linear-gradient(135deg, #fefce8, #fef9c3);
      border: 1px solid #fde68a;
      border-radius: var(--radius-md);
      padding: 24px 28px;
      margin: 20px 0;
      position: relative;
      overflow: hidden;
    }
    .warn-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, #f59e0b, #d97706);
    }
    .warn-box h4 {
      color: #92400e;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .warn-box p, .warn-box .warn-body {
      font-size: 13px;
      color: #78350f;
      line-height: 1.8;
      margin: 0;
    }

    /* ============================================================
       MISC / CODE BLOCK
       ============================================================ */
    .code-block {
      background: var(--near-black);
      color: #e2e8f0;
      padding: 20px 24px;
      border-radius: var(--radius-md);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
      overflow-x: auto;
      margin: 0;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
    }
    
    .split-console {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 32px;
      margin-top: 24px;
    }
    @media (max-width: 1024px) {
      .split-console {
        grid-template-columns: 1fr;
      }
    }

    /* ============================================================
       SIDEBAR TOGGLE BUTTON (Redesigned)
       ============================================================ */
    .sidebar-toggle-row {
      margin-top: 20px;
      margin-bottom: -8px;
    }
    .sidebar-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 500;
      height: 30px;
      border: 1px solid var(--border-light);
      background: var(--canvas-white);
      border-radius: 8px;
      transition: all 0.2s;
      color: var(--slate);
      font-family: 'Inter', sans-serif;
      box-shadow: var(--shadow-sm);
    }
    .sidebar-toggle:hover {
      background: var(--near-black);
      color: var(--canvas-white);
      border-color: var(--near-black);
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 1024px) {
      .layout-container {
        grid-template-columns: 1fr;
        gap: 24px;
      }
      aside { position: relative; top: 0; max-height: none; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="app-container nav-bar">
      <a href="list.html" class="logo" style="display: flex; align-items: center; gap: 8px;"><img src="favicon.png" alt="가이드 로고" style="width: 24px; height: 24px; border-radius: 4px; object-fit: cover;">NBOS Exhibition Guide</a>
      <nav class="nav-links">
        <a href="list.html" class="nav-link">카드 리스트</a>
        <a href="detail.html" class="nav-link active">상세 가이드</a>
      </nav>
      <div></div>
    </div>
  </header>

  <!-- 사이드바 접기/펼치기 버튼 (레이아웃 독립) -->
  <div class="app-container sidebar-toggle-row">
    <button id="sidebarToggleBtn" class="sidebar-toggle">
      <span id="toggleIcon">◀</span> <span id="toggleText">사이드 메뉴 접기</span>
    </button>
  </div>

  <div class="app-container layout-container">
    <!-- Sidebar -->
    <aside>
      <div class="sidebar-inner">
        <div class="sidebar-label">Card Navigator</div>
        <ul id="sidebarMenu">
          <!-- Dynamic sidebar items -->
        </ul>
      </div>
    </aside>

    <!-- Guide Body -->
    <main class="guide-body" id="guideContent">
      <div style="padding: 40px; text-align: center; color: var(--slate);" class="mono-label">
        가이드 데이터를 로딩하고 있습니다...
      </div>
    </main>
  </div>

  <!-- Footer -->
  <footer>
    <div class="app-container" style="display: flex; justify-content: space-between; align-items: flex-start; gap: 48px; flex-wrap: wrap;">
      <div style="flex: 1; min-width: 200px;">
        <div class="mono-label" style="margin-bottom: 14px;">시스템 정보</div>
        <p style="font-size: 13px; color: var(--muted-slate); line-height: 1.7;">
          LFmall NBOS 전시 기획 관리자<br>(리뉴얼 어드민)
        </p>
      </div>
      <div style="flex: 1; min-width: 200px;">
        <div class="mono-label" style="margin-bottom: 14px;">운영 표준 가이드</div>
        <ul style="list-style: none; font-size: 13px; display: flex; flex-direction: column; gap: 6px;">
          <li><a href="rules.md" style="display: inline-flex; align-items: center; gap: 4px;">→ 기획전 제작 표준 원칙</a></li>
          <li><a href="design.md" style="display: inline-flex; align-items: center; gap: 4px;">→ 디자인 시스템 가이드 토큰</a></li>
        </ul>
      </div>
      <div style="flex: 1.5; min-width: 240px;">
        <div class="mono-label" style="margin-bottom: 14px;">가이드 제작 정보</div>
        <p style="font-size: 13px; color: var(--muted-slate); line-height: 1.7;">
          LFmall 온라인 MD 분들의 편리한 기획전 운영을 위해<br>극도의 세련미와 직관적인 구조로 제작되었습니다.
        </p>
      </div>
    </div>
  </footer>

  <script src="db.js"></script>
  <script>
    let wireframes = {};
    let guides = {};

    function init() {
      // CORS & File protocol secure fallback: 로컬 file:/// 기동 시 fetch 보안 에러 원천 차단
      // db.js 가 전역 window 객체에 로드한 데이터를 즉시 안전하게 참조합니다.
      if (window.ExhibitionGuides && window.ExhibitionWireframes) {
        guides = window.ExhibitionGuides;
        wireframes = window.ExhibitionWireframes;
        console.log("Successfully loaded offline master database from db.js");
        buildSidebar();
        loadActiveCard();
      } else {
        console.warn("db.js not loaded or empty. Attempting fetch fallback...");
        fetchFallback();
      }

      // 사이드바 접기/펼치기 이벤트 설정
      const toggleBtn = document.getElementById('sidebarToggleBtn');
      const layoutContainer = document.querySelector('.layout-container');
      const toggleIcon = document.getElementById('toggleIcon');
      const toggleText = document.getElementById('toggleText');

      if (toggleBtn && layoutContainer) {
        toggleBtn.addEventListener('click', () => {
          layoutContainer.classList.toggle('sidebar-collapsed');
          const isCollapsed = layoutContainer.classList.contains('sidebar-collapsed');
          toggleIcon.textContent = isCollapsed ? '▶' : '◀';
          toggleText.textContent = isCollapsed ? '사이드 메뉴 펼치기' : '사이드 메뉴 접기';
        });
      }
    }

    async function fetchFallback() {
      try {
        const [wfRes, gdRes] = await Promise.all([
          fetch('wireframes.json'),
          fetch('guides_db.json')
        ]);
        wireframes = await wfRes.json();
        guides = await gdRes.json();
        buildSidebar();
        loadActiveCard();
      } catch (err) {
        console.error("Critical: Failed to load database.", err);
        loadLocalDatabaseDirectly();
      }
    }

    // 파일 프로토콜(file:///) 환경에서 CORS 보안 정책 우회를 위한 완벽한 인라인 로컬 DB 장착
    function loadLocalDatabaseDirectly() {
      // 1. Guides DB Fallback
      guides = {
        "TAB_CONTAINER": {
          "cardKey": "TAB_CONTAINER",
          "name": "탭 컨테이너",
          "category": "NAV",
          "sourceFile": "frmPlanTempTabContainer.xfdl (어드민) / TabContainer.tsx (프론트)",
          "moduleCode": "MD13",
          "desc": "1단 또는 2단 복합 탭 구조를 조립·설계하여, 사용자가 클릭 시 새로고침 없이 상품 딜 목록 및 배너를 동적으로 비동기 교체하는 초고성능 전시판 컨트롤러입니다.",
          "layoutDescription": "사용자 프론트 영역(PC 및 모바일 화면)에서는 최상단 가로 스크롤링 카테고리 탭 메뉴바가 상단 고정(Sticky)되며, 사용자가 다른 탭 클릭 시 스크롤 위치 이동을 방어하며 내부 상품 슬라이드(Swiper) 및 하위 배너 정보가 비동기로 즉시 리렌더링됩니다. 개별 탭 패널 내부 상단에 이미지 광고 배너(mobiImgPath)를 매핑하거나, 패널 최하단에 상세 랜딩을 유도하는 양끝이 둥근 모던 버튼(btnText)을 기획적 옵션으로 가미할 수 있습니다.",
          "backendSettings": [
            { "field": "여백 상단외부", "id": "CARD_THTP_EXTR_MRGI_USE_YN", "type": "Boolean (Y/N)", "desc": "컴포넌트 바깥쪽 상단 여백(Margin) 유무를 설정합니다." },
            { "field": "여백 상단내부", "id": "CARD_THTP_INNR_MRGI_USE_YN", "type": "Boolean (Y/N)", "desc": "컴포넌트 안쪽 상단 여백(Padding) 유무를 설정합니다. 기본값 Y." },

          "codeSnippet": "// TabContainer.tsx - 1단/2단 탭 비동기 로드 및 Swiper 렌더링 로직 일부\nconst TabContainer = React.memo(({ tabInfo, template, onRender }) => {\n  const [ntorNo, setNtorNo] = useState<number>(Number(tabInfo?.tabContainerList![0]?.tabList![0]?.ntorNo) || 0);\n  const { data } = useFetchExhbEventDealProductGET({\n    params: { evntNo: Number(template?.exhbCardNo), orderFlag: tabInfo.prodSortType ?? 'A', ntorNo: ntorNo || 0 }\n  });\n  const swiperSlideList = useMemo(() => {\n    let productList = data?.pages[0].eventDealProductList ?? [];\n    if (tabInfo.prodSortType === 'M') shuffleArray(productList); // 상품 랜덤 셔플\n    return productList?.map((product, idx) => (\n      <SwiperSlide key={`item_${idx}`} className={styles.wrapSlide}>\n        <TabContItem props={product} template={template} />\n      </SwiperSlide>\n    ));\n  }, [data, tabInfo]);\n  return (\n    <div className={styles.tabContainer} style={{ backgroundColor: tabInfo?.bkgdClr }}>\n      <Tabs selectedIndex={containerIdx} onSelect={(idx) => { setContainerIdx(idx); setTabIdx(0); }}>\n        <TabList>\n          {tabInfo?.tabContainerList?.map((item, idx) => (\n            <Tab key={idx}>{item?.tabContainer?.evntNtorMainText}</Tab>\n          ))}\n        </TabList>\n        {/* ... 중첩 자식 탭 및 Swiper 마운트 렌더링 ... */}\n      </Tabs>\n    </div>\n  );\n});",

    function loadActiveCard() {
      const urlParams = new URLSearchParams(window.location.search);
      const cardParam = urlParams.get('card');
      
      if (cardParam && guides[cardParam]) {
        switchGuide(cardParam);
      } else {
        switchGuide('TAB_CONTAINER');
      }
    }

    function buildSidebar() {
      const sidebarMenu = document.getElementById('sidebarMenu');
      sidebarMenu.innerHTML = '';
      
      Object.keys(guides).forEach(key => {
        const item = guides[key];
        const li = document.createElement('li');
        li.innerHTML = `<a href="#" data-card-key="${key}" onclick="switchGuide('${key}')">${item.cardKey} (${item.name})</a>`;
        sidebarMenu.appendChild(li);
      });
    }

    function switchGuide(cardKey) {
      const links = document.querySelectorAll('aside a');
      links.forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('data-card-key') === cardKey) {
          link.classList.add('active');
        }
      });

      const data = guides[cardKey];
      // 지능형 바인딩: JSON 런타임 fetch 로드 및 파일프로토콜 fallback 와이어프레임 즉시 매핑 처리
      const wf = wireframes[cardKey];

      if (data) {
        const wireframeHtml = wf ? wf.wireframeHtml : '<div style="padding: 24px; color: var(--slate); text-align:center;" class="mono-label">[ WIREFRAME PENDING ]</div>';
        
        let tableRows = '';
        if (data.backendSettings && data.backendSettings.length > 0) {

            <tr>
              <td><span class="field-name">${set.field}</span></td>
              <td><span class="field-id">${set.id}</span></td>
              <td><span class="field-type">${set.type}</span></td>
              <td style="color: var(--slate); font-size: 13px;">${set.desc}</td>
            </tr>
          `).join('');
        } else {
          tableRows = `<tr><td colspan="4" style="text-align: center; color: var(--slate); padding: 32px;">어드민 매핑 설정 항목이 존재하지 않습니다.</td></tr>`;
        }

        // 경고 텍스트에서 줄바꿈(\\n)을 <br>로 변환
        const warningsHtml = (data.warnings || '').replace(/\\n/g, '<br>').replace(/\n/g, '<br>');

        document.getElementById('guideContent').innerHTML = `
          <!-- 1. 상단: 타이틀 영역 -->

            <h1>${data.name} 가이드</h1>
            <div class="guide-meta-row">
              <span class="guide-meta-chip accent">${data.cardKey}</span>
              <span class="guide-meta-chip">${data.moduleCode || 'N/A'}</span>
              <span class="guide-meta-chip">${data.category || '일반'}</span>
            </div>
            ${data.desc ? `<p class="guide-desc">${data.desc}</p>` : ''}
          </div>

          <!-- 이미지 업로드 가이드 -->
          ${data.imageGuidelines ? `
          <div class="img-guide-card">
            <div class="img-guide-header">
              <span class="icon">📷</span>
              <span>이미지 업로드 규격 & 용량 제한 가이드</span>
            </div>
            <div class="img-guide-grid">
              <div class="img-guide-item">
                <span class="label">PC 이미지 권장 사이즈</span>
                <span class="value">${data.imageGuidelines.pcSize}</span>
              </div>
              <div class="img-guide-item">
                <span class="label">Mobile 이미지 권장 사이즈</span>
                <span class="value">${data.imageGuidelines.moSize}</span>
              </div>
              <div class="img-guide-item">
                <span class="label">허용 파일 포맷</span>
                <span class="value" style="font-family: 'Space Mono', monospace;">${data.imageGuidelines.allowTypes}</span>
              </div>
              <div class="img-guide-item">
                <span class="label">업로드 용량 제한</span>
                <span class="value warn">${data.imageGuidelines.maxSize}</span>
              </div>
            </div>
            <div class="img-guide-footer">
              <strong>⚠️ NBOS 어드민 자동 검증 규칙</strong><br>
              ${data.imageGuidelines.adminValidation}

          </div>
          ` : ''}

          <!-- 수량 및 개수 제한 가이드 -->
          ${data.qtyGuidelines ? `

            <div class="qty-guide-header">

            <div class="qty-guide-grid">
              <div class="qty-guide-item">
                <span class="label">최소 구성 단위</span>
                <span class="value">${data.qtyGuidelines.tabMin}</span>
              </div>
              <div class="qty-guide-item">
                <span class="label">최대 구성 단위</span>
                <span class="value">${data.qtyGuidelines.tabMax}</span>
              </div>
              <div class="qty-guide-item">
                <span class="label">최소 수량 / 글자수</span>
                <span class="value">${data.qtyGuidelines.prodMin}</span>
              </div>
              <div class="qty-guide-item">
                <span class="label">최대 수량 / 글자수</span>
                <span class="value warn">${data.qtyGuidelines.prodMax}</span>
              </div>
            </div>
            <div class="qty-guide-footer">
              <strong>⚠️ NBOS 어드민 수량 저장 검증 규칙</strong><br>
              ${data.qtyGuidelines.adminValidation}
            </div>
          </div>
          ` : ''}

          <!-- 2. 화면 미리보기 (듀얼 프리뷰) -->
          <div class="section-block">
            <div class="section-header">
              <span class="section-num">1</span>
              <h2>화면 미리보기 (PC & Mobile)</h2>

          </div>
          <div class="preview-console">

            <div>
              <div class="preview-label"><span class="label-dot pc"></span> PC 미리보기</div>
              <div class="desktop-mockup">
                <div class="browser-header">
                  <div class="browser-dots">
                    <div class="browser-dot red"></div>
                    <div class="browser-dot yellow"></div>
                    <div class="browser-dot green"></div>
                  </div>
                  <div class="browser-address-bar">https://www.lfmall.co.kr/planning.do?card=${data.cardKey}</div>
                </div>
                <div class="browser-content">
                  ${wireframeHtml}
                </div>
              </div>
            </div>

            <!-- Mobile 미리보기 Block -->
            <div>
              <div class="preview-label"><span class="label-dot mo"></span> Mobile 미리보기</div>
              <div class="phone-mockup">
                <!-- Status bar mock -->
                <div style="background: var(--near-black); height: 24px; display: flex; justify-content: space-between; padding: 0 16px; align-items: center; color: white; font-size: 10px; font-family: 'Inter', sans-serif;">

            <p class="section-subtitle">어드민(NBOS) 신규기획전 관리 시스템 등록 시, 각 상세 옵션 항목별 설명 및 데이터 입력 규칙입니다.</p>
          </div>
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th style="width: 20%;">항목명</th>
                  <th style="width: 22%;">시스템 ID</th>
                  <th style="width: 16%;">데이터 규격</th>
                  <th style="width: 42%;">입력 가이드 & 상세 규칙</th>
                </tr>
              </thead>
              <tbody>
                ${tableRows}
              </tbody>
            </table>
          </div>

          <!-- 4. 운영 주의사항 -->
          <div class="section-block">
            <div class="section-header">
              <span class="section-num">3</span>
              <h2>필수 주의사항 & 운영 가이드</h2>
            </div>
          </div>
          <div class="warn-box">
            <h4>⚠ 기획전 운영 유의사항</h4>
            <div class="warn-body">${warningsHtml}</div>
          </div>
        `;

        // Update active URL parameter cleanly without page refresh (safe query update on both http and file protocols)
        try {
          const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?card=' + cardKey;
          window.history.replaceState({ card: cardKey }, '', newUrl);
        } catch (e) {
          console.warn("URL update bypassed or failed due to environment constraints: ", e);
        }
      }
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/--/g, "&#45;&#45;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    window.onload = init;
  </script>
